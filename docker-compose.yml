services:
  wgflow:
    build: .
    container_name: wgflow
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
      net.netfilter.nf_conntrack_acct: "1"
    ports:
      - "${WG_LISTEN_PORT}:${WG_LISTEN_PORT}/udp"
      - "${HOSTBIND_WG_PANEL}:8080/tcp"
    volumes:
      - ./data:/data
      # Dynamically mounts based on the .env selection
      - ${KERNEL_LOG_PATH:-/dev/null}:${KERNEL_LOG_PATH:-/dev/null}:ro
    environment:
      WG_INTERFACE: ${WG_INTERFACE}
      WG_LISTEN_PORT: ${WG_LISTEN_PORT}
      WG_SUBNET: ${WG_SUBNET}
      WG_SERVER_ADDRESS: ${WG_SERVER_ADDRESS}
      WG_ENDPOINT: ${WG_ENDPOINT}
      WG_LOCAL_DNS: ${WG_LOCAL_DNS}
      WG_PEER_DNS: ${WG_PEER_DNS}
      WG_DNS_UPSTREAMS: ${WG_DNS_UPSTREAMS}
      WG_DEFAULT_ACL: ${WG_DEFAULT_ACL}
      WGFLOW_DATA_DIR: "/data"
      WGFLOW_BIND: ${WGFLOW_BIND}
      PANEL_PASSWORD: ${PANEL_PASSWORD}
      WGFLOW_IPTABLES_LOG: ${WGFLOW_IPTABLES_LOG}
      WGFLOW_TELEMETRY_ENABLED: ${WGFLOW_TELEMETRY_ENABLED}
      # Optional. Leave empty to use the per-instance derived secret
      # (recommended). Set this only if you are running your own collector
      # and have a shared key arrangement with it.
      WGFLOW_TELEMETRY_SECRET: ${WGFLOW_TELEMETRY_SECRET:-}
