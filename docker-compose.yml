services:
  wgflow:
    build: .
    container_name: wgflow
    restart: unless-stopped
    # NET_ADMIN is enough for wg + iptables. NET_RAW lets the diagnostics
    # tools (ping/mtr/traceroute) send ICMP without privileged mode. We
    # deliberately avoid --privileged. SYS_MODULE would only be needed if
    # we wanted the container to load the wireguard kernel module itself;
    # we expect the host to have it loaded.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    ports:
      # WireGuard: must be reachable from the internet (or wherever peers live)
      - "51820:51820/udp"
      # Admin API: bound to host loopback only. Put nginx/caddy in front of
      # this on the host for TLS + auth.
      - "127.0.0.1:8080:8080/tcp"
    volumes:
      # Persisted state: server keys, sqlite db, generated peer configs.
      - ./data:/data
      # Optional: bind-mount the host's kernel log so the wireguard / iptables
      # log streams in the admin UI work. Without this the corresponding tabs
      # show "configure host log mount". The file is read-only.
      # Path varies by host:
      #   Debian/Ubuntu (rsyslog):   /var/log/kern.log
      #   Most systemd-only hosts:   journald — use journalctl host-side instead
      #   Alpine:                    /var/log/messages
      # Uncomment the line below if your host writes kernel logs to a file:
      # - "/var/log/kern.log:/var/log/kern.log:ro"
    environment:
      WG_INTERFACE: wg0
      WG_LISTEN_PORT: "51820"
      WG_SUBNET: "10.13.13.0/24"
      WG_SERVER_ADDRESS: "10.13.13.1/24"
      # Public endpoint peers will dial. Override with your DNS name or public IP.
      WG_ENDPOINT: "vpn.example.com:51820"
      # Whether to run dnsmasq inside the container as the local DNS resolver
      # for peers. When "1" (default): dnsmasq runs, peer configs use the
      # server as DNS, the admin UI shows the DNS recent-queries panel and
      # the DNS override tab. When "0": dnsmasq is not started, peers use
      # WG_PEER_DNS (defaults to 1.1.1.1 when local DNS is off), and the
      # DNS-related UI is hidden.
      WG_LOCAL_DNS: "1"
      # DNS handed to peers in their generated configs. If unset, defaults to:
      #   - the wgflow server's IP (e.g. 10.13.13.1)  when WG_LOCAL_DNS=1
      #   - 1.1.1.1                                   when WG_LOCAL_DNS=0
      # Set this explicitly only if you want to override the auto-derived
      # default (e.g. point peers at a separate internal resolver).
      # WG_PEER_DNS: "1.1.1.1"
      # Upstream resolvers dnsmasq forwards to. Comma-separated. First entry
      # is preferred (strict-order is enabled). Each entry can be:
      #   - bare IP:               1.1.1.1
      #   - IP with custom port:   1.1.1.1#5353
      #   - bracketed IPv6:        [2001:4860:4860::8888]
      # Ignored when WG_LOCAL_DNS=0.
      WG_DNS_UPSTREAMS: "8.8.8.8,8.8.4.4,1.1.1.1"
      # Default ACL applied to every new peer unless overridden at creation.
      # Comma-separated list of IP / CIDR / IP:port/proto entries.
      WG_DEFAULT_ACL: "10.0.0.0/8"
      # Data dir inside the container.
      WGFLOW_DATA_DIR: "/data"
      WGFLOW_BIND: "0.0.0.0:8080"
      # Admin panel password. Leave EMPTY to disable auth (default — assumes
      # the panel is loopback-only and protected by a reverse proxy upstream).
      # If set, the UI shows a login screen; the value can be either a
      # plaintext password or a bcrypt hash starting with $2a$/$2b$/$2y$.
      # Generate a hash with:
      #   docker run --rm python:3-slim sh -c "pip install bcrypt -q && python -c 'import bcrypt; print(bcrypt.hashpw(b\"yourpassword\", bcrypt.gensalt(12)).decode())'"
      PANEL_PASSWORD: ""
      # Optional: enable iptables drop logging. When set to "1" or "true",
      # packets that fall through every per-peer ACL chain (i.e. denied
      # traffic) get logged to the kernel log with the `WGFLOW-DROP:` prefix,
      # rate-limited to ~10 per minute. The admin UI's "iptables drops" log
      # tab tails this. Default off — small per-packet overhead when on,
      # zero when off. Requires the kern.log bind-mount above for the UI
      # tab to work.
      WGFLOW_IPTABLES_LOG: "0"
